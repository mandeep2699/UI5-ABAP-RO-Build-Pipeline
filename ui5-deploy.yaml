# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: com.transports.transport
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: DE1
          url: http://gldusenw.releaseowl.com:8080
        app:
          name: ZRO_DEMO_FIORI
          package: ZRO_DEMO
        exclude:
          - /test/
